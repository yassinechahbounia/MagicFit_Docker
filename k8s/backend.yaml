apiVersion: v1
kind: Service
metadata:
  name: magicfit-backend
  namespace: magicfit
spec:
  type: ClusterIP
  selector:
    app: magicfit-backend
  ports:
  - name: http
    port: 80
    targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: magicfit-backend
  namespace: magicfit
spec:
  replicas: 1        # ← réduit de 2 → 1 pour t3.micro
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: magicfit-backend
  template:
    metadata:
      labels:
        app: magicfit-backend
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"

      - name: php-fpm
        image: 158975163788.dkr.ecr.us-east-1.amazonaws.com/magicfit-backend:latest
        ports:
        - containerPort: 9000
        envFrom:
        - configMapRef:
            name: magicfit-config
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: magicfit-secrets
              key: DB_PASSWORD
        - name: APP_KEY
          valueFrom:
            secretKeyRef:
              name: magicfit-secrets
              key: APP_KEY
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"

      volumes:
      - name: nginx-conf
        configMap:
          name: magicfit-backend-nginx-conf

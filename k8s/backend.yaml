apiVersion: v1
kind: Service
metadata:
  name: magicfit-backend
  namespace: magicfit
spec:
  type: ClusterIP
  selector:
    app: magicfit-backend
  ports:
  - name: http
    port: 80
    targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: magicfit-backend
  namespace: magicfit
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: magicfit-backend
  template:
    metadata:
      labels:
        app: magicfit-backend
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"

      - name: php-fpm
        image: BACKEND_IMAGE          # ← remplacé par sed en CI
        ports:
        - containerPort: 9000
        envFrom:
        - configMapRef:
            name: magicfit-config
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: magicfit-secrets
              key: DB_PASSWORD
        - name: APP_KEY
          valueFrom:
            secretKeyRef:
              name: magicfit-secrets
              key: APP_KEY
        resources:
          requests:
            memory: "64Mi"     # réduit de 128Mi
            cpu: "50m"         # réduit de 100m
          limits:
            memory: "192Mi"    # réduit de 256Mi
            cpu: "200m"        # réduit de 300m

      volumes:
      - name: nginx-conf
        configMap:
          name: magicfit-backend-nginx-conf

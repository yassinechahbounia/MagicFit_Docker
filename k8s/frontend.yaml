apiVersion: v1
kind: Service
metadata:
  name: magicfit-frontend
  namespace: magicfit
  annotations:
    # Exemple: demander explicitement un NLB via annotations EKS si nécessaire
    # service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    # (à activer seulement si tu vois un LB différent de celui voulu)
spec:
  type: LoadBalancer
  selector:
    app: magicfit-frontend
  ports:
  - name: http
    port: 80
    targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: magicfit-frontend
  namespace: magicfit
spec:
  replicas: 2
  selector:
    matchLabels:
      app: magicfit-frontend
  template:
    metadata:
      labels:
        app: magicfit-frontend
    spec:
      containers:
      - name: frontend
        image: 273220735056.dkr.ecr.us-east-1.amazonaws.com/magicfit-frontend:latest
        ports:
        - containerPort: 80

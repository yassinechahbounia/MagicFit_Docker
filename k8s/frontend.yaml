apiVersion: v1
kind: Service
metadata:
  name: magicfit-frontend
  namespace: magicfit
spec:
  type: LoadBalancer
  selector:
    app: magicfit-frontend
  ports:
  - name: http
    port: 80
    targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: magicfit-frontend
  namespace: magicfit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: magicfit-frontend
  template:
    metadata:
      labels:
        app: magicfit-frontend
    spec:
      containers:
      - name: frontend
        image: FRONTEND_IMAGE          # ← remplacé par sed en CI
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d
        - name: nginx-global
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
      volumes:
      - name: nginx-conf
        configMap:
          name: magicfit-frontend-nginx-conf
      - name: nginx-global
        configMap:
          name: magicfit-frontend-nginx-global

apiVersion: v1
kind: ConfigMap
metadata:
  name: magicfit-config
  namespace: magicfit
data:
  # Laravel
  APP_NAME: "MagicFit"
  APP_ENV: "dev"
  APP_DEBUG: "true"

  # Logging (stderr = capturable par K8s / CloudWatch)
  LOG_CHANNEL: "stderr"
  LOG_LEVEL: "info"

  # Sur EKS: ton backend est joignable via son Service K8s
  APP_URL: "http://magicfit-backend"

  # DB (non sensible)
  DB_CONNECTION: "mysql"
  DB_HOST: "magicfit-db.magicfit.svc.cluster.local"
  DB_PORT: "3306"
  DB_DATABASE: "magicfit_mirror"
  DB_USERNAME: "magicfit_user"

  # Queue System (AWS SQS)
  QUEUE_CONNECTION: "sqs"
  SQS_QUEUE: "magicfit-queue"
  # SQS_PREFIX sera injecté nativement via variables Terraform ou depuis le POD env
  AWS_DEFAULT_REGION: "us-east-1"

name: Build & Deploy MagicFit

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: 158975163788
  EKS_CLUSTER: magicfit-eks-dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ─── Auth AWS via OIDC (pas de secrets AWS_ACCESS_KEY) ───
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::158975163788:role/magicfit-gha-deploy
          aws-region: ${{ env.AWS_REGION }}

      # ─── Login ECR ───
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ─── Build & Push Backend ───
      - name: Build & Push Backend
        env:
          IMAGE: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/magicfit-backend:${{ github.sha }}
        run: |
          docker build -t $IMAGE -f Dockerfile.backend .
          docker push $IMAGE
          echo "BACKEND_IMAGE=$IMAGE" >> $GITHUB_ENV

      # ─── Build & Push Frontend ───
      - name: Build & Push Frontend
        env:
          IMAGE: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/magicfit-frontend:${{ github.sha }}
        run: |
          docker build -t $IMAGE -f Dockerfile.frontend .
          docker push $IMAGE
          echo "FRONTEND_IMAGE=$IMAGE" >> $GITHUB_ENV

      # ─── Build & Push MagicMirror ───
      - name: Build & Push MagicMirror
        env:
          IMAGE: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/magicfit-magicmirror:${{ github.sha }}
        run: |
          docker build -t $IMAGE -f Dockerfile.magicmirror .
          docker push $IMAGE
          echo "MAGICMIRROR_IMAGE=$IMAGE" >> $GITHUB_ENV

      # ─── Build & Push MagicMirror Proxy ───
      - name: Build & Push MagicMirror Proxy
        env:
          IMAGE: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/magicfit-magicmirror-proxy:${{ github.sha }}
        run: |
          docker build -t $IMAGE -f Dockerfile.magicmirror-proxy .
          docker push $IMAGE
          echo "MAGICMIRROR_PROXY_IMAGE=$IMAGE" >> $GITHUB_ENV

      # ─── Deploy to EKS ───
      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      - name: Deploy to EKS
        run: |
          # Remplacer les images dans les manifests
          sed -i "s|BACKEND_IMAGE|$BACKEND_IMAGE|g" k8s/backend.yaml
          sed -i "s|FRONTEND_IMAGE|$FRONTEND_IMAGE|g" k8s/frontend.yaml
          sed -i "s|MAGICMIRROR_IMAGE|$MAGICMIRROR_IMAGE|g" k8s/magicmirror.yaml
          sed -i "s|MAGICMIRROR_PROXY_IMAGE|$MAGICMIRROR_PROXY_IMAGE|g" k8s/magicmirror-proxy.yaml

          kubectl apply -f k8s/ -n magicfit
          kubectl rollout status deployment -n magicfit --timeout=300s
##
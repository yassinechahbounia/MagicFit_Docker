name: Build & Deploy MagicFit

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: 158975163788
  EKS_CLUSTER: magicfit-eks-dev
  ECR_BASE: 158975163788.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    #runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 pour avoir tout l'historique et tous les tags
          fetch-depth: 0

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::158975163788:role/magicfit-gha-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push — Backend
        run: |
          # 1. Définir le tag image avec le SHA du commit
          IMAGE=${{ env.ECR_BASE }}/magicfit-backend:${{ github.sha }}

          # 2. Build et push vers ECR
          docker build -t $IMAGE -f backend/Dockerfile ./backend
          docker push $IMAGE

          # 3. Exporter pour l'étape Deploy
          echo "BACKEND_IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Build & Push — Frontend
        run: |
          IMAGE=${{ env.ECR_BASE }}/magicfit-frontend:${{ github.sha }}
          docker build -t $IMAGE -f frontend/Dockerfile ./frontend
          docker push $IMAGE
          echo "FRONTEND_IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Build & Push — MagicMirror
        run: |
          IMAGE=${{ env.ECR_BASE }}/magicfit-magicmirror:${{ github.sha }}
          docker build -t $IMAGE -f magicmirror/Dockerfile ./magicmirror
          docker push $IMAGE
          echo "MAGICMIRROR_IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Build & Push — MagicMirror Proxy
        run: |
          IMAGE=${{ env.ECR_BASE }}/magicfit-magicmirror-proxy:${{ github.sha }}
          docker build -t $IMAGE -f Dockerfile.magicmirror-proxy .
          docker push $IMAGE
          echo "MAGICMIRROR_PROXY_IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Configure kubectl
        run: |
          # Pointer kubectl vers le cluster EKS
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      - name: Deploy to EKS
        run: |
          # 1. Injecter les images buildées dans les manifests k8s
          sed -i "s|BACKEND_IMAGE|$BACKEND_IMAGE|g"             k8s/backend.yaml
          sed -i "s|FRONTEND_IMAGE|$FRONTEND_IMAGE|g"           k8s/frontend.yaml
          sed -i "s|MAGICMIRROR_IMAGE|$MAGICMIRROR_IMAGE|g"     k8s/magicmirror.yaml
          sed -i "s|MAGICMIRROR_PROXY_IMAGE|$MAGICMIRROR_PROXY_IMAGE|g" k8s/magicmirror-proxy.yaml

          # 2. Appliquer tous les manifests
          kubectl apply -f k8s/ -n magicfit

          # 3. Attendre que les déploiements soient stables
          kubectl rollout status deployment -n magicfit --timeout=300s
##
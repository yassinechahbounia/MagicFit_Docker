name: magicfit-dev

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

jobs:
  build_push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::273220735056:role/magicfit-gha-deploy
          aws-region: us-east-1

      - name: Login to ECR
        run: aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 273220735056.dkr.ecr.us-east-1.amazonaws.com

      - name: Build & push frontend
        run: |
          docker build -t magicfit-frontend:latest ./magicfit-frontend
          docker tag magicfit-frontend:latest 273220735056.dkr.ecr.us-east-1.amazonaws.com/magicfit-frontend:latest
          docker push 273220735056.dkr.ecr.us-east-1.amazonaws.com/magicfit-frontend:latest

      - name: Build & push backend
        run: |
          docker build -t magicfit-backend:latest ./magicfit-backend
          docker tag magicfit-backend:latest 273220735056.dkr.ecr.us-east-1.amazonaws.com/magicfit-backend:latest
          docker push 273220735056.dkr.ecr.us-east-1.amazonaws.com/magicfit-backend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: [ build_push ]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::273220735056:role/magicfit-gha-deploy
          aws-region: us-east-1

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region us-east-1 --name magicfit-eks-dev

      - name: Deploy Infrastructure Prereqs
        run: |
          kubectl apply -f k8s/namespace.yaml
          # External Secrets Operator déjà installé via Helm

      - name: Deploy Secrets (External Secrets)
        run: |
          kubectl apply -f k8s/02-secretstore-aws.yaml -n magicfit
          kubectl apply -f k8s/03-externalsecret-magicfit.yaml -n magicfit
          # Attend sync (30s)
          kubectl wait --for=condition=Ready externalsecret/magicfit-secrets -n magicfit --timeout=60s
          echo "✅ Secrets synchronisés !"

      - name: Deploy Applications
        run: |
          kubectl apply -f k8s/backend.yaml -n magicfit
          kubectl apply -f k8s/frontend.yaml -n magicfit
          kubectl rollout status deploy/magicfit-backend -n magicfit --timeout=300s
          kubectl rollout status deploy/magicfit-frontend -n magicfit --timeout=300s
        # Pas besoin de l'ancien secret.yaml !

      - name: Verify Deployment
        run: |
          kubectl get pods -n magicfit
          kubectl get svc -n magicfit
          kubectl get secret -n magicfit magicfit-secrets

      - name: Rollback on failure
        if: failure()
        run: |
          kubectl rollout undo deploy/magicfit-backend -n magicfit || true
          kubectl rollout undo deploy/magicfit-frontend -n magicfit || true

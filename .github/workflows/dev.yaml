name: magicfit-dev

on:
  push:
    branches: ["main"]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "158975163788"
  EKS_CLUSTER_NAME: magicfit-eks-dev


jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, bcmath, gd, zip
      - name: Install Dependencies
        working-directory: ./magicfit-backend
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      - name: Setup environment
        working-directory: ./magicfit-backend
        run: |
          cp .env.example .env
          php artisan key:generate
      - name: Run Tests
        working-directory: ./magicfit-backend
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan test

  build_push:
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "image_tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::158975163788:role/magicfit-gha-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend
        run: |
          TAG=${{ steps.meta.outputs.image_tag }}
          docker build -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/magicfit-backend:$TAG ./magicfit-backend
          docker tag $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/magicfit-backend:$TAG $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/magicfit-backend:latest
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/magicfit-backend:$TAG
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/magicfit-backend:latest

      - name: Build & push frontend
        run: |
          TAG=${{ steps.meta.outputs.image_tag }}
          docker build -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/magicfit-frontend:$TAG ./magicfit-frontend
          docker tag $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/magicfit-frontend:$TAG $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/magicfit-frontend:latest
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/magicfit-frontend:$TAG
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/magicfit-frontend:latest

      - name: Build & push magicmirror
        run: |
          TAG=${{ steps.meta.outputs.image_tag }}
          docker build -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/magicfit-magicmirror:$TAG ./MagicMirror
          docker tag $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/magicfit-magicmirror:$TAG $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/magicfit-magicmirror:latest
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/magicfit-magicmirror:$TAG
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/magicfit-magicmirror:latest

      - name: Build & push magicmirror-proxy
        run: |
          TAG=${{ steps.meta.outputs.image_tag }}
          docker build -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/magicfit-magicmirror-proxy:$TAG -f ./Dockerfile.magicmirror-proxy .
          docker tag $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/magicfit-magicmirror-proxy:$TAG $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/magicfit-magicmirror-proxy:latest
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/magicfit-magicmirror-proxy:$TAG
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/magicfit-magicmirror-proxy:latest

  deploy:
    runs-on: ubuntu-latest
    needs: [build_push]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::158975163788:role/magicfit-gha-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: kubeconfig
        run: aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME

      - name: Deploy (apply manifests)
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml -n magicfit
          kubectl apply -f k8s/db.yaml -n magicfit
          kubectl apply -f k8s/backend-ngnix-config.yaml -n magicfit
          kubectl apply -f k8s/backend.yaml -n magicfit
          kubectl apply -f k8s/backend-hpa.yaml -n magicfit
          kubectl apply -f k8s/frontend.yaml -n magicfit
          kubectl apply -f k8s/magicmirror.yaml -n magicfit

      - name: Update images to latest commit tag
        run: |
          TAG=${{ needs.build_push.outputs.image_tag }}
          NS=magicfit
          REG=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
          
          kubectl set image deploy/magicfit-backend php-fpm=$REG/magicfit-backend:$TAG -n $NS
          kubectl set image deploy/magicfit-frontend frontend=$REG/magicfit-frontend:$TAG -n $NS
          kubectl set image deploy/magicfit-magicmirror magicmirror=$REG/magicfit-magicmirror:$TAG -n $NS
          kubectl set image deploy/magicfit-magicmirror-proxy nginx=$REG/magicfit-magicmirror-proxy:$TAG -n $NS

      - name: Wait for rollouts
        run: |
          kubectl rollout status deploy/magicfit-backend -n magicfit
          kubectl rollout status deploy/magicfit-frontend -n magicfit

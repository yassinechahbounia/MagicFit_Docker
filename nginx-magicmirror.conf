server {
  listen 80;
  server_name _;

  location /socket.io/ {
    proxy_pass http://magicfit-magicmirror:8080/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }

  location /api/ {
    proxy_pass http://magicfit-backend/api/;
    proxy_set_header Host $host;
  }

  location / {
    proxy_pass http://magicfit-magicmirror:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }
}
